{% extends "base.html" %}
{% block content %}
<style>
    .basekit-shell {
        max-width: 560px;
        margin: 2rem auto;
        padding: 1.25rem;
        border: 1px solid #d4d4d4;
        border-radius: 8px;
        background: #fafafa;
        color: #222;
        text-align: center;
    }
    .basekit-link {
        display: inline-block;
        margin-top: 0.85rem;
        padding: 0.55rem 0.9rem;
        border: 1px solid #8a8a8a;
        border-radius: 6px;
        background: #efefef;
        color: #222;
        text-decoration: none;
    }
</style>

<div class="basekit-shell">
    <h3>Sua senha foi alterada.</h3>
    <p>Você pode retornar e fazer seu login.</p>
    <a class="basekit-link" href="{% url 'login' %}">Entrar</a>
</div>
{% endblock content %}
