{% extends "base.html" %}
{% block content %}
{% load widget_tweaks %}
<style>
    .basekit-shell {
        max-width: 560px;
        margin: 2rem auto;
        padding: 1.25rem;
        border: 1px solid #d4d4d4;
        border-radius: 8px;
        background: #fafafa;
        color: #222;
    }
    .basekit-help {
        margin-bottom: 1rem;
        color: #555;
    }
    .basekit-input input {
        width: 100%;
        padding: 0.55rem 0.65rem;
        border: 1px solid #bdbdbd;
        border-radius: 6px;
        background: #fff;
        color: #222;
    }
    .basekit-button {
        width: 100%;
        margin-top: 0.9rem;
        padding: 0.6rem 0.75rem;
        border: 1px solid #8a8a8a;
        border-radius: 6px;
        background: #efefef;
        color: #222;
        cursor: pointer;
    }
</style>

<div class="basekit-shell">
    <h2>Recuperar senha</h2>
    <p class="basekit-help">Insira seu e-mail para receber as instruções de recuperação de senha.</p>
    <form method="post">
        {% csrf_token %}
        <div class="basekit-input">
            {% render_field form.email placeholder="Insira seu e-mail" %}
        </div>
        <input class="basekit-button" type="submit" value="Recuperar senha">
    </form>
</div>
{% endblock content %}
