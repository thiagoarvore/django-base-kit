{% extends "base.html" %}
{% block content %}
{% load widget_tweaks %}
<style>
    .basekit-shell {
        max-width: 560px;
        margin: 2rem auto;
        padding: 1.25rem;
        border: 1px solid #d4d4d4;
        border-radius: 8px;
        background: #fafafa;
        color: #222;
    }
    .basekit-row {
        margin-bottom: 0.85rem;
    }
    .basekit-row label {
        display: block;
        margin-bottom: 0.35rem;
    }
    .basekit-row input {
        width: 100%;
        padding: 0.55rem 0.65rem;
        border: 1px solid #bdbdbd;
        border-radius: 6px;
        background: #fff;
        color: #222;
    }
    .basekit-button {
        width: 100%;
        padding: 0.6rem 0.75rem;
        border: 1px solid #8a8a8a;
        border-radius: 6px;
        background: #efefef;
        color: #222;
        cursor: pointer;
    }
</style>

<div class="basekit-shell">
    <h2>Alterar senha</h2>
    <form method="post">
        {% csrf_token %}
        {% for field in form %}
            <div class="basekit-row">
                {{ field.label_tag }}
                {% render_field field %}
            </div>
        {% endfor %}
        <div>
            <input type="submit" class="basekit-button" value="Mudar senha">
        </div>
    </form>
</div>
{% endblock content %}
